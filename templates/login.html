<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Picture Frame — Login</title>
  <link rel="icon" type="image/x-icon" href="/static/heart.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .card {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem 2rem;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
      color: #fff;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo .icon { font-size: 2.5rem; }
    .logo h1 { font-size: 1.3rem; font-weight: 600; margin-top: .4rem; letter-spacing: .02em; }
    .logo p { font-size: .82rem; color: rgba(255,255,255,.5); margin-top: .2rem; }

    .alert {
      padding: .7rem 1rem;
      border-radius: 10px;
      font-size: .85rem;
      margin-bottom: 1.2rem;
      background: rgba(239,68,68,.18);
      border: 1px solid rgba(239,68,68,.35);
      color: #fca5a5;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: rgba(255,255,255,.65);
      margin-bottom: .4rem;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: .7rem 1rem;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px;
      color: #fff;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, background .2s;
      margin-bottom: 1.2rem;
    }
    input:focus {
      border-color: rgba(99,179,237,.6);
      background: rgba(255,255,255,.12);
    }
    input::placeholder { color: rgba(255,255,255,.25); }

    button[type="submit"] {
      width: 100%;
      padding: .8rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .03em;
      transition: opacity .2s, transform .1s;
      margin-top: .4rem;
    }
    button[type="submit"]:hover { opacity: .9; }
    button[type="submit"]:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">💖</div>
      <h1>Picture Frame</h1>
      <p>Entre para continuar</p>
    </div>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" placeholder="seu usuário" required autofocus>

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>

      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
